services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vlxd
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/vlxd
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:8080}
      FRONTEND_CONFIG_PATH: /data/config/pages/landing.json
    volumes:
      - shared-config:/data/config/pages
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000/api}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000/api}
    volumes:
      - shared-config:/app/config/pages
    ports:
      - "${FRONTEND_PORT:-80}:3000"

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_STOREFRONT_URL: ${VITE_STOREFRONT_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-8080}:80"

volumes:
  mongo-data:
  shared-config:
